name: Deploy panel

on:
  push:
    branches: [main]
    paths:
      - 'panel/**'
      - '.github/workflows/deploy-panel.yml'
  workflow_dispatch:

# Secrets/variables required (see docs/azure-setup.md):
#   secret AZURE_SWA_TOKEN — Static Web Apps deployment token
#   var    API_ORIGIN      — https://<api-app>.azurewebsites.net
jobs:
  deploy:
    name: Publish to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # A missing API_ORIGIN would deploy a panel that calls localhost.
      - name: Require API origin
        run: test -n "${{ vars.API_ORIGIN }}" || { echo "::error::Repository variable API_ORIGIN is not set"; exit 1; }

      - run: pnpm install --frozen-lockfile

      # The API origin is baked into the bundle at build time.
      - run: pnpm --filter @copilot/panel build
        env:
          VITE_API_URL: ${{ vars.API_ORIGIN }}

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          action: upload
          app_location: panel/dist
          skip_app_build: true
