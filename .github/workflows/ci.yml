name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Panel + extension (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads the pinned pnpm version from "packageManager" in package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check
      - run: pnpm build

  backend:
    name: Backend (.NET build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Copilot.slnx
      - run: dotnet build Copilot.slnx --no-restore --configuration Release
      - run: dotnet test Copilot.slnx --no-build --configuration Release
